# =============================================================================
# render-video.yml
#
# Lives in the PUBLIC "burner" repo: dubailottery0909/super-duper-disco
# Triggered by the Next.js API via POST /repos/.../dispatches
#
# Pipeline:
#   1. A configurable swarm of parallel jobs renders video chunks
#   2. One final job stitches all chunks together with ffmpeg
#   3. The final MP4 is published as a public GitHub release asset
#   4. The render_jobs row in Cloudflare D1 DB is marked 'completed'
# =============================================================================

name: Render Video

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "UUID of the render job (matches render_jobs.id in D1)"
        required: true
        type: string
      props:
        description: "JSON-serialised VideoProps to pass to Remotion"
        required: true
        type: string

permissions:
  contents: write

env:
  REMOTION_CONCURRENCY: '4'
  REMOTION_CHUNKS: '60'
  PREPARED_WORKSPACE_ARTIFACT: prepared-renderer-workspace

# ─────────────────────────────────────────────────────────────────────────────
# PHASE 0 — PREPARE RENDERER
# Clone once, install once, ensure browser once, bundle once.
# All render jobs reuse this prepared workspace artifact.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  prepare-renderer:
    name: Prepare renderer workspace
    runs-on: ubuntu-latest
    outputs:
      chunk_matrix: ${{ steps.chunk-matrix.outputs.chunk_matrix }}
      total_frames: ${{ steps.frames.outputs.total_frames }}

    steps:
      # ── 1. Clone Private Vault ──────────────────────────────────────────────
      - name: Clone private vault
        run: |
          git clone \
            https://x-access-token:${{ secrets.PRIVATE_REPO_PAT }}@github.com/0Cymantek0/video-render.git \
            ./repo

      # ── 2. Setup Node & Install deps ────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./repo/package-lock.json

      - name: Install dependencies
        working-directory: ./repo
        run: npm ci --prefer-offline --no-audit

      # ── 3. Write props once for all chunk jobs ──────────────────────────────
      - name: Write props.json
        run: |
          echo '${{ inputs.props }}' > ./repo/props.json

      - name: Stage remote render assets once
        working-directory: ./repo
        run: |
          node scripts/stage-render-assets.mjs \
            --props ./props.json \
            --output-dir render-assets/workflow/${{ inputs.job_id }}

      - name: Build chunk matrix
        id: chunk-matrix
        run: |
          CHUNK_MATRIX=$(node -e "const count = Number.parseInt(process.env.REMOTION_CHUNKS, 10); console.log(JSON.stringify(Array.from({length: count}, (_, index) => index)));")
          echo "chunk_matrix=${CHUNK_MATRIX}" >> $GITHUB_OUTPUT

      # ── 4. Calculate total frames once ──────────────────────────────────────
      - name: Calculate total frames
        id: frames
        working-directory: ./repo
        run: |
          cat << 'EOF' > calc-frames.ts
          import { getVideoDurationInFrames } from './src/remotion/duration';
          import fs from 'fs';
          const props = JSON.parse(fs.readFileSync('./props.json', 'utf-8'));
          console.log(getVideoDurationInFrames(props));
          EOF

          TOTAL_FRAMES=$(npx tsx calc-frames.ts)
          echo "total_frames=${TOTAL_FRAMES}" >> $GITHUB_OUTPUT
          echo "Total Frames: $TOTAL_FRAMES"

      # ── 5. Install Chromium once for all chunk jobs ─────────────────────────
      - name: Install Chromium
        working-directory: ./repo
        run: npx remotion browser ensure

      # ── 6. Warm the production bundle cache once ────────────────────────────
      - name: Warm Remotion bundle cache
        working-directory: ./repo
        run: npx remotion compositions src/remotion/index.ts --log=verbose >/dev/null

      # ── 7. Pack prepared workspace for fast fan-out ─────────────────────────
      - name: Pack prepared workspace
        run: tar --exclude='./repo/.git' -czf renderer-workspace.tgz ./repo

      - name: Upload prepared workspace artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PREPARED_WORKSPACE_ARTIFACT }}
          path: renderer-workspace.tgz
          retention-days: 1
          compression-level: 0


# ─────────────────────────────────────────────────────────────────────────────
# PHASE 1 — THE SWARM
# REMOTION_CHUNKS concurrent runners each render one slice of the video
# ─────────────────────────────────────────────────────────────────────────────
  render-chunk:
    name: Render chunk ${{ matrix.chunk_index }}
    runs-on: ubuntu-latest
    needs: prepare-renderer

    strategy:
      fail-fast: false   # if one chunk errors, let others finish so we can debug
      matrix:
        chunk_index: ${{ fromJSON(needs.prepare-renderer.outputs.chunk_matrix) }}

    steps:
      # ── 1. Download prepared renderer workspace ─────────────────────────────
      - name: Download prepared workspace
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PREPARED_WORKSPACE_ARTIFACT }}

      - name: Extract prepared workspace
        run: tar -xzf renderer-workspace.tgz

      # ── 2. Calculate frame range ────────────────────────────────────────────
      - name: Calculate frame range
        id: frames
        run: |
          TOTAL_FRAMES=${{ needs.prepare-renderer.outputs.total_frames }}
          CHUNKS=${{ env.REMOTION_CHUNKS }}
          CHUNK_SIZE=$(( TOTAL_FRAMES / CHUNKS ))
          CHUNK_INDEX=${{ matrix.chunk_index }}
          START_FRAME=$(( CHUNK_INDEX * CHUNK_SIZE ))
          
          # Last chunk takes any remainder
          if [ $CHUNK_INDEX -eq $(( CHUNKS - 1 )) ]; then
            END_FRAME=$(( TOTAL_FRAMES - 1 ))
          else
            END_FRAME=$(( START_FRAME + CHUNK_SIZE - 1 ))
          fi
          
          echo "start=${START_FRAME}" >> $GITHUB_OUTPUT
          echo "end=${END_FRAME}" >> $GITHUB_OUTPUT
          echo "Total Frames: $TOTAL_FRAMES | Chunk $CHUNK_INDEX → frames ${START_FRAME}-${END_FRAME}"

      # ── 3. Render the chunk ─────────────────────────────────────────────────
      # --frames=START-END renders only the slice this runner owns
      # --props=./props.json passes the dynamic lottery data
      - name: Render chunk ${{ matrix.chunk_index }}
        working-directory: ./repo
        run: |
          npx remotion render \
            src/remotion/index.ts \
            OuterFrame \
            out.mp4 \
            --props=./props.json \
            --frames=${{ steps.frames.outputs.start }}-${{ steps.frames.outputs.end }} \
            --concurrency=${{ env.REMOTION_CONCURRENCY }} \
            --codec=h264 \
            --log=verbose

      # ── 4. Upload chunk as artifact ─────────────────────────────────────────
      # Each chunk artifact is named chunk-N so they don't overwrite each other.
      # The final job downloads all of them in order.
      - name: Upload chunk artifact
        uses: actions/upload-artifact@v4
        with:
          name: chunk-${{ matrix.chunk_index }}
          path: ./repo/out.mp4
          retention-days: 1   # these are temp files; delete after 1 day


# ─────────────────────────────────────────────────────────────────────────────
# PHASE 2 — STITCH & DELIVER
# Runs after all 20 chunk jobs succeed. Downloads, concatenates, and publishes.
# ─────────────────────────────────────────────────────────────────────────────
  combine-and-deliver:
    name: Stitch chunks & publish download
    runs-on: ubuntu-latest
    needs: render-chunk   # waits for ALL 20 matrix jobs to finish

    steps:
      # ── 1. Download all chunk artifacts ──────────────────────────────────────
      # actions/download-artifact@v4 downloads into a directory per artifact,
      # so chunk-0/out.mp4, chunk-1/out.mp4, … chunk-N/out.mp4
      - name: Download all chunks
        uses: actions/download-artifact@v4
        with:
          pattern: chunk-*
          merge-multiple: false   # keep them in separate subdirectories

      # ── 2. Install ffmpeg ─────────────────────────────────────────────────────
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # ── 3. Generate concat list ───────────────────────────────────────────────
      # ffmpeg's concat demuxer needs a text file listing files in order.
      # We sort numerically (chunk-0, chunk-1 …) so the video
      # is assembled in the correct sequence.
      - name: Generate concat.txt
        run: |
          CHUNKS=${{ env.REMOTION_CHUNKS }}
          > concat.txt
          for i in $(seq 0 $(( CHUNKS - 1 ))); do
            echo "file 'chunk-${i}/out.mp4'" >> concat.txt
          done
          echo "--- concat.txt contents ---"
          cat concat.txt

      # ── 4. Stitch with ffmpeg ─────────────────────────────────────────────────
      # -c copy does a bitstream copy — NO re-encoding.
      # This is near-instant (seconds, not minutes) and lossless.
      - name: Stitch final video
        run: |
          ffmpeg \
            -f concat \
            -safe 0 \
            -i concat.txt \
            -c copy \
            final-video.mp4
          echo "Final video size: $(du -sh final-video.mp4)"

      # ── 5. Publish the final MP4 as a public GitHub release asset ────────────
      # This gives the browser a direct GitHub-hosted download URL, so Vercel
      # never proxies the 300 MB file and we avoid storage limits.
      - name: Publish direct download asset
        id: release_asset
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_ID: ${{ inputs.job_id }}
          RELEASE_TAG: renders
          REPOSITORY: ${{ github.repository }}
        run: |
          ASSET_NAME="render-${JOB_ID}.mp4"
          ASSET_PATH="./${ASSET_NAME}"
          DOWNLOAD_URL="https://github.com/${REPOSITORY}/releases/download/${RELEASE_TAG}/${ASSET_NAME}"

          gh release view "${RELEASE_TAG}" --repo "${REPOSITORY}" >/dev/null 2>&1 || \
            gh release create "${RELEASE_TAG}" \
              --repo "${REPOSITORY}" \
              --title "Rendered videos" \
              --notes "Automated video render outputs for direct browser downloads."

          cp "./final-video.mp4" "${ASSET_PATH}"

          gh release upload "${RELEASE_TAG}" "${ASSET_PATH}" \
            --repo "${REPOSITORY}" \
            --clobber

          echo "asset_name=${ASSET_NAME}" >> "${GITHUB_OUTPUT}"
          echo "download_url=${DOWNLOAD_URL}" >> "${GITHUB_OUTPUT}"

      # ── 6. Mark the job completed in D1 DB ─────────────────────────────────────
      - name: Mark job completed in D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          JOB_ID: ${{ inputs.job_id }}
          DIRECT_DOWNLOAD_URL: ${{ steps.release_asset.outputs.download_url }}
        run: |
          JOB_ID="${{ inputs.job_id }}"
          DIRECT_URL="${{ steps.release_asset.outputs.download_url }}"
          
          if [ -z "$DIRECT_URL" ]; then
            echo "Missing direct download URL"
            exit 1
          fi
          
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database/${CLOUDFLARE_D1_DATABASE_ID}/raw" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"sql\": \"UPDATE render_jobs SET status = 'completed', progress = 100, message = 'Render complete — direct download ready', url = ?, updated_at = datetime('now') WHERE id = ?\",
              \"params\": [\"${DIRECT_URL}\", \"${JOB_ID}\"]
            }")
          
          echo "$RESPONSE" | grep -q '"success":true' && \
            echo "render_jobs row ${JOB_ID} marked completed ✓" || \
            (echo "D1 update failed: $RESPONSE" && exit 1)

      # ── 7. Upload final video as GH artifact too (optional backup) ────────────
      - name: Upload final video as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-video-${{ inputs.job_id }}
          path: final-video.mp4
          retention-days: 7
